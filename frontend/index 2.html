<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DIY-Assist Chat</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
      .wrap { max-width: 960px; margin: 0 auto; padding: 20px; }
      .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      input, textarea, button { font: inherit; }
      input, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
      textarea { min-height: 90px; resize: vertical; }
      .field { flex: 1; min-width: 200px; }
      button { background: #1d4ed8; color: white; border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .muted { color: #6b7280; font-size: 14px; }
      pre { white-space: pre-wrap; margin: 0; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef2ff; color: #3730a3; font-size: 12px; margin-right: 6px; }
      ul { margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>DIY-Assist Minimal Frontend</h1>
      <p class="muted">Tests retrieval + LM Studio/Ollama chat through <code>/api/v1/chat</code>.</p>

      <div class="card">
        <div class="row">
          <div class="field">
            <label>Appliance Category</label>
            <input id="category" value="Appliance" />
          </div>
          <div class="field">
            <label>Top K</label>
            <input id="topk" type="number" min="1" max="10" value="3" />
          </div>
        </div>
        <div style="margin-top: 12px;">
          <label>Problem</label>
          <textarea id="query">My washer is not draining and makes a humming noise.</textarea>
        </div>
        <div style="margin-top: 12px;">
          <button id="sendBtn">Send</button>
        </div>
      </div>

      <div class="card">
        <h3>Assistant Answer</h3>
        <pre id="answer">No answer yet.</pre>
      </div>

      <div class="card">
        <h3>Citations</h3>
        <div id="citations" class="muted">No citations yet.</div>
      </div>

      <div class="card">
        <h3>Live iFixit Guides</h3>
        <div id="liveGuides" class="muted">No live guides yet.</div>
      </div>
    </div>

    <script src="/frontend/main.js"></script>
  </body>
  </html>
